name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feature/**'
      - 'hotfix/**'
      - 'copilot/**'
      - 'release/**'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Semver Preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gittools/actions/gitversion/setup@v4.3.3
        with:
          versionSpec: '6.x'

      - id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.3
        with:
          configFilePath: GitVersion.yml

      - name: Show calculated version
        run: echo "Version this PR would produce → v${{ steps.gitversion.outputs.semVer }}"

  vet:
    name: Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Run tests
        run: CGO_ENABLED=1 go test -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Build CLI binaries
        run: |
          CGO_ENABLED=1 go build ./cmd/nexus-cli/...
          CGO_ENABLED=1 go build ./cmd/nexus-daemon/...
          CGO_ENABLED=1 go build ./cmd/nexus-submit/...
