name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0). Creates the tag and publishes a release."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install zig
        run: |
          ZIG_VERSION="0.14.0"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar xf zig.tar.xz
          sudo mv "zig-linux-x86_64-${ZIG_VERSION}/zig" /usr/local/bin/
          sudo mv "zig-linux-x86_64-${ZIG_VERSION}/lib" /usr/local/lib/zig
          rm -rf zig.tar.xz "zig-linux-x86_64-${ZIG_VERSION}"
          zig version

      - name: Run tests
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            goarch: amd64
            cc: "zig cc -target x86_64-linux-musl"
            cxx: "zig c++ -target x86_64-linux-musl"
            ext: tar.gz
            bin_ext: ""
            static_flags: -extldflags=-static

          - os: linux
            arch: arm64
            runner: ubuntu-latest
            goarch: arm64
            cc: "zig cc -target aarch64-linux-musl"
            cxx: "zig c++ -target aarch64-linux-musl"
            ext: tar.gz
            bin_ext: ""
            static_flags: ""

          - os: darwin
            arch: amd64
            runner: macos-latest
            goarch: amd64
            cc: ""
            cxx: ""
            ext: tar.gz
            bin_ext: ""
            static_flags: ""

          - os: darwin
            arch: arm64
            runner: macos-latest
            goarch: arm64
            cc: ""
            cxx: ""
            ext: tar.gz
            bin_ext: ""
            static_flags: ""

          - os: windows
            arch: amd64
            runner: ubuntu-latest
            goarch: amd64
            cc: "zig cc -target x86_64-windows-gnu"
            cxx: "zig c++ -target x86_64-windows-gnu"
            ext: zip
            bin_ext: ".exe"
            static_flags: ""

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install zig
        if: matrix.runner == 'ubuntu-latest'
        run: |
          ZIG_VERSION="0.14.0"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar xf zig.tar.xz
          sudo mv "zig-linux-x86_64-${ZIG_VERSION}/zig" /usr/local/bin/
          sudo mv "zig-linux-x86_64-${ZIG_VERSION}/lib" /usr/local/lib/zig
          rm -rf zig.tar.xz "zig-linux-x86_64-${ZIG_VERSION}"
          zig version

      - name: Build binaries
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${VERSION:-dev}"
          LDFLAGS="-s -w -X main.version=${VERSION} ${{ matrix.static_flags }}"

          mkdir -p dist

          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nexus-cli${{ matrix.bin_ext }} ./cmd/nexus-cli/...

          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nexus-daemon${{ matrix.bin_ext }} ./cmd/nexus-daemon/...

          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nexus-submit${{ matrix.bin_ext }} ./cmd/nexus-submit/...

      - name: Create archive
        run: |
          ARCHIVE_NAME="nexus-orchestrator-${{ matrix.os }}-${{ matrix.arch }}"
          cd dist

          if [ "${{ matrix.ext }}" = "zip" ]; then
            zip "../${ARCHIVE_NAME}.zip" nexus-cli${{ matrix.bin_ext }} nexus-daemon${{ matrix.bin_ext }} nexus-submit${{ matrix.bin_ext }}
          else
            tar czf "../${ARCHIVE_NAME}.tar.gz" nexus-cli${{ matrix.bin_ext }} nexus-daemon${{ matrix.bin_ext }} nexus-submit${{ matrix.bin_ext }}
          fi

      - name: Upload archive
        uses: actions/upload-artifact@v6
        with:
          name: nexus-orchestrator-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}
          path: nexus-orchestrator-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}

  build-desktop:
    name: Build Desktop ${{ matrix.os }}-${{ matrix.arch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-latest
            platform: darwin/arm64
            archive_ext: tar.gz
            archive_name: nexus-orchestrator-desktop-darwin-arm64
            wails_tags: ""

          - os: darwin
            arch: amd64
            runner: macos-13
            platform: darwin/amd64
            archive_ext: tar.gz
            archive_name: nexus-orchestrator-desktop-darwin-amd64
            wails_tags: ""

          - os: windows
            arch: amd64
            runner: windows-latest
            platform: windows/amd64
            archive_ext: zip
            archive_name: nexus-orchestrator-desktop-windows-amd64
            wails_tags: ""

          - os: linux
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            archive_ext: tar.gz
            archive_name: nexus-orchestrator-desktop-linux-amd64
            wails_tags: "webkit2_41"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev pkg-config

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build desktop app
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${VERSION:-dev}"
          EXTRA_TAGS="${{ matrix.wails_tags }}"
          TAGS_FLAG=${EXTRA_TAGS:+"-tags ${EXTRA_TAGS}"}
          wails build -platform ${{ matrix.platform }} ${TAGS_FLAG} -ldflags "-s -w -X main.version=${VERSION}"

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd build/bin
          tar czf "../../${{ matrix.archive_name }}.tar.gz" *
          cd ../..

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "build/bin/*" -DestinationPath "${{ matrix.archive_name }}.zip"

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive_name }}.${{ matrix.archive_ext }}
          path: ${{ matrix.archive_name }}.${{ matrix.archive_ext }}

  release:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate CLI checksums
        run: |
          cd artifacts
          find . -name 'nexus-orchestrator-*' ! -name 'nexus-orchestrator-desktop-*' -exec sha256sum {} + > ../SHA256SUMS.txt
          cd ..
          find artifacts -maxdepth 1 -type f -exec mv {} . \;

      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            nexus-orchestrator-linux-amd64.tar.gz
            nexus-orchestrator-linux-arm64.tar.gz
            nexus-orchestrator-darwin-amd64.tar.gz
            nexus-orchestrator-darwin-arm64.tar.gz
            nexus-orchestrator-windows-amd64.zip
            SHA256SUMS.txt

  release-desktop:
    name: Upload Desktop Artifacts
    needs: [build-desktop, release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: always() && needs.release.result == 'success' && needs.build-desktop.result == 'success'
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate desktop checksums
        run: |
          cd artifacts
          find . -name 'nexus-orchestrator-desktop-*' -exec sha256sum {} + > ../SHA256SUMS-desktop.txt
          cd ..
          find artifacts -maxdepth 1 -type f -exec mv {} . \;

      - name: Upload desktop artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          files: |
            nexus-orchestrator-desktop-darwin-arm64.tar.gz
            nexus-orchestrator-desktop-darwin-amd64.tar.gz
            nexus-orchestrator-desktop-windows-amd64.zip
            nexus-orchestrator-desktop-linux-amd64.tar.gz
            SHA256SUMS-desktop.txt
