name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install zig
        run: |
          sudo apt-get update && sudo apt-get install -y zig

      - name: Run tests
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            goarch: amd64
            cc: "zig cc -target x86_64-linux-musl"
            cxx: "zig c++ -target x86_64-linux-musl"
            ext: tar.gz
            bin_ext: ""
            static_flags: -extldflags=-static

          - os: linux
            arch: arm64
            runner: ubuntu-latest
            goarch: arm64
            cc: "zig cc -target aarch64-linux-musl"
            cxx: "zig c++ -target aarch64-linux-musl"
            ext: tar.gz
            bin_ext: ""
            static_flags: -extldflags=-static

          - os: darwin
            arch: amd64
            runner: macos-latest
            goarch: amd64
            cc: ""
            cxx: ""
            ext: tar.gz
            bin_ext: ""
            static_flags: ""

          - os: darwin
            arch: arm64
            runner: macos-latest
            goarch: arm64
            cc: ""
            cxx: ""
            ext: tar.gz
            bin_ext: ""
            static_flags: ""

          - os: windows
            arch: amd64
            runner: ubuntu-latest
            goarch: amd64
            cc: "zig cc -target x86_64-windows-gnu"
            cxx: "zig c++ -target x86_64-windows-gnu"
            ext: zip
            bin_ext: ".exe"
            static_flags: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install zig
        if: matrix.runner == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y zig

      - name: Build binaries
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          LDFLAGS="-s -w -X main.version=${VERSION} ${{ matrix.static_flags }}"

          mkdir -p dist

          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nexus-cli${{ matrix.bin_ext }} ./cmd/nexus-cli/...

          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nexus-daemon${{ matrix.bin_ext }} ./cmd/nexus-daemon/...

          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nexus-submit${{ matrix.bin_ext }} ./cmd/nexus-submit/...

      - name: Create archive
        run: |
          ARCHIVE_NAME="nexusOrchestrator-${{ matrix.os }}-${{ matrix.arch }}"
          cd dist

          if [ "${{ matrix.ext }}" = "zip" ]; then
            zip "../${ARCHIVE_NAME}.zip" nexus-cli${{ matrix.bin_ext }} nexus-daemon${{ matrix.bin_ext }} nexus-submit${{ matrix.bin_ext }}
          else
            tar czf "../${ARCHIVE_NAME}.tar.gz" nexus-cli${{ matrix.bin_ext }} nexus-daemon${{ matrix.bin_ext }} nexus-submit${{ matrix.bin_ext }}
          fi

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: nexusOrchestrator-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}
          path: nexusOrchestrator-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum nexusOrchestrator-*.* > ../SHA256SUMS.txt
          cd ..
          mv artifacts/* .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            nexusOrchestrator-*.tar.gz
            nexusOrchestrator-*.zip
            SHA256SUMS.txt
