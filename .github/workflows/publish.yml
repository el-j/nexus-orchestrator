name: Publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      tag: ${{ steps.check_tag.outputs.tag }}
      exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gittools/actions/gitversion/setup@v4.3.3
        with:
          versionSpec: '6.x'

      - id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.3
        with:
          configFilePath: GitVersion.yml

      - id: check_tag
        shell: bash
        run: |
          TAG="v${{ steps.gitversion.outputs.semVer }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  vet:
    needs: version
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: go vet
        run: go vet ./...

  lint:
    needs: version
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    needs: version
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Run tests
        shell: bash
        run: CGO_ENABLED=1 go test -race -count=1 ./...

  frontend-test:
    needs: version
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check frontend
        working-directory: frontend
        run: npx vue-tsc --noEmit

      - name: Run frontend smoke coverage
        working-directory: frontend
        run: npm run test:coverage

  vscode-gate:
    needs: version
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Run extension smoke coverage
        working-directory: vscode-extension
        run: npm run test:coverage

      - name: Build extension
        working-directory: vscode-extension
        run: npm run build

      - name: Package VSIX (smoke test)
        working-directory: vscode-extension
        shell: bash
        run: npx @vscode/vsce package --no-dependencies

  e2e:
    needs: [version, test, frontend-test, vscode-gate]
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Run daemon E2E smoke
        shell: bash
        run: ./scripts/e2e-smoke.sh

  release-gate:
    needs: [version, vet, lint, test, frontend-test, vscode-gate, e2e]
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm full release gate passed
        run: echo "Publish gate passed"

  build-cli:
    name: Build CLI ${{ matrix.os }}-${{ matrix.arch }}
    needs: [version, release-gate]
    if: needs.version.outputs.exists == 'false'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            goarch: amd64
            cc: "zig cc -target x86_64-linux-musl"
            cxx: "zig c++ -target x86_64-linux-musl"
            ext: tar.gz
            bin_ext: ""
            static_flags: -extldflags=-static

          - os: linux
            arch: arm64
            runner: ubuntu-latest
            goarch: arm64
            cc: "zig cc -target aarch64-linux-musl"
            cxx: "zig c++ -target aarch64-linux-musl"
            ext: tar.gz
            bin_ext: ""
            static_flags: -extldflags=-static

          - os: darwin
            arch: amd64
            runner: macos-latest
            goarch: amd64
            cc: ""
            cxx: ""
            ext: tar.gz
            bin_ext: ""
            static_flags: ""

          - os: darwin
            arch: arm64
            runner: macos-latest
            goarch: arm64
            cc: ""
            cxx: ""
            ext: tar.gz
            bin_ext: ""
            static_flags: ""

          - os: windows
            arch: amd64
            runner: ubuntu-latest
            goarch: amd64
            cc: "zig cc -target x86_64-windows-gnu"
            cxx: "zig c++ -target x86_64-windows-gnu"
            ext: zip
            bin_ext: ".exe"
            static_flags: ""

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Install zig
        if: matrix.runner == 'ubuntu-latest'
        shell: bash
        run: |
          ZIG_VERSION="0.14.0"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar xf zig.tar.xz
          sudo mv "zig-linux-x86_64-${ZIG_VERSION}/zig" /usr/local/bin/
          sudo mv "zig-linux-x86_64-${ZIG_VERSION}/lib" /usr/local/lib/zig
          rm -rf zig.tar.xz "zig-linux-x86_64-${ZIG_VERSION}"
          zig version

      - name: Build binaries
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          LDFLAGS="-s -w -X main.version=${VERSION} ${{ matrix.static_flags }}"
          mkdir -p dist

          # nexus-cli and nexus-submit are pure Go HTTP clients with no CGO dependencies.
          # Building with CGO_ENABLED=0 avoids CGO linker failures when cross-compiling
          # for Linux targets using zig cc (musl).
          CGO_ENABLED=0 go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nexus-cli${{ matrix.bin_ext }} ./cmd/nexus-cli/...

          CGO_ENABLED=0 go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nexus-submit${{ matrix.bin_ext }} ./cmd/nexus-submit/...

          # nexus-daemon embeds go-sqlite3 which requires CGO.
          CGO_ENABLED=1 go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nexus-daemon${{ matrix.bin_ext }} ./cmd/nexus-daemon/...

      - name: Create archive
        shell: bash
        run: |
          ARCHIVE_NAME="nexus-orchestrator-${{ matrix.os }}-${{ matrix.arch }}"
          cd dist
          if [ "${{ matrix.ext }}" = "zip" ]; then
            zip "../${ARCHIVE_NAME}.zip" nexus-cli${{ matrix.bin_ext }} nexus-daemon${{ matrix.bin_ext }} nexus-submit${{ matrix.bin_ext }}
          else
            tar czf "../${ARCHIVE_NAME}.tar.gz" nexus-cli${{ matrix.bin_ext }} nexus-daemon${{ matrix.bin_ext }} nexus-submit${{ matrix.bin_ext }}
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: nexus-orchestrator-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}
          path: nexus-orchestrator-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}

  build-desktop:
    name: Build Desktop ${{ matrix.os }}-${{ matrix.arch }}
    needs: [version, release-gate]
    if: needs.version.outputs.exists == 'false'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-latest
            platform: darwin/arm64
            archive_ext: zip
            archive_name: nexus-orchestrator-desktop-darwin-arm64
            wails_tags: ""

          - os: darwin
            arch: amd64
            runner: macos-latest
            platform: darwin/amd64
            archive_ext: zip
            archive_name: nexus-orchestrator-desktop-darwin-amd64
            wails_tags: ""

          - os: windows
            arch: amd64
            runner: windows-latest
            platform: windows/amd64
            archive_ext: zip
            archive_name: nexus-orchestrator-desktop-windows-amd64
            wails_tags: ""

          - os: linux
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            archive_ext: tar.gz
            archive_name: nexus-orchestrator-desktop-linux-amd64
            wails_tags: "webkit2_41"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev pkg-config

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build desktop app
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          EXTRA_TAGS="${{ matrix.wails_tags }}"
          TAGS_FLAG=${EXTRA_TAGS:+"-tags ${EXTRA_TAGS}"}
          wails build -platform ${{ matrix.platform }} ${TAGS_FLAG} -ldflags "-s -w -X main.version=${VERSION}"
          mkdir -p dist/desktop
          cp -r build/bin/* dist/desktop/

      - name: Sign macOS app
        if: matrix.os == 'darwin'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_NAME: ${{ secrets.APPLE_DEVELOPER_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            # Full code signing + notarization (requires Apple Developer ID certificate secrets)
            echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
            security create-keychain -p "" build.keychain
            security import /tmp/certificate.p12 -k build.keychain \
              -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-keychain-settings -t 3600 -u build.keychain
            security unlock-keychain -p "" build.keychain
            security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
            security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain

            codesign --deep --force --options runtime \
              --entitlements build/darwin/entitlements.plist \
              --sign "Developer ID Application: $APPLE_DEVELOPER_NAME" \
              dist/desktop/nexusOrchestrator.app

            ditto -c -k --sequesterRsrc --keepParent \
              dist/desktop/nexusOrchestrator.app /tmp/notarize.zip
            xcrun notarytool submit /tmp/notarize.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple dist/desktop/nexusOrchestrator.app

            security delete-keychain build.keychain
            rm -f /tmp/certificate.p12 /tmp/notarize.zip
          else
            # Ad-hoc signing: removes the "damaged and can't be opened" Gatekeeper error.
            # Users who download from the internet may still need to clear the quarantine
            # attribute manually: xattr -dr com.apple.quarantine nexusOrchestrator.app
            codesign --deep --force --sign - dist/desktop/nexusOrchestrator.app
          fi

      - name: Package macOS (zip via ditto)
        if: matrix.os == 'darwin'
        shell: bash
        run: |
          # ditto preserves macOS resource forks, symlinks, and extended attributes
          # that tar can silently drop. The output is a standard macOS zip archive.
          ditto -c -k --sequesterRsrc --keepParent \
            dist/desktop/nexusOrchestrator.app \
            "${{ matrix.archive_name }}.zip"

      - name: Package Linux (tar.gz)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          cd dist/desktop
          tar czf "../../${{ matrix.archive_name }}.tar.gz" *
          cd ../..

      - name: Package Windows (zip)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/desktop/*" -DestinationPath "${{ matrix.archive_name }}.zip"

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive_name }}.${{ matrix.archive_ext }}
          path: ${{ matrix.archive_name }}.${{ matrix.archive_ext }}

  build-vscode:
    name: Build VS Code Extension
    needs: [version, release-gate]
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Run extension smoke coverage
        working-directory: vscode-extension
        run: npm run test:coverage

      - name: Build extension
        working-directory: vscode-extension
        run: npm run build

      - name: Package VSIX
        shell: bash
        run: |
          mkdir -p dist/vscode
          cd vscode-extension
          npx @vscode/vsce package --no-dependencies --out ../dist/vscode/nexus-orchestrator.vsix

      - uses: actions/upload-artifact@v6
        with:
          name: nexus-orchestrator-vscode.vsix
          path: dist/vscode/nexus-orchestrator.vsix

  release:
    name: Create Release
    needs: [version, build-cli, build-desktop, build-vscode]
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Create and push tag
        shell: bash
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Skip if the tag already exists on the remote (e.g. created by the version workflow)
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote — skipping tag creation."
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          find . -name 'nexus-orchestrator-*' ! -name 'nexus-orchestrator-desktop-*' ! -name 'nexus-orchestrator-vscode*' -exec sha256sum {} + > ../SHA256SUMS.txt
          find . -name 'nexus-orchestrator-desktop-*' -exec sha256sum {} + > ../SHA256SUMS-desktop.txt
          find . -name 'nexus-orchestrator*.vsix' -exec sha256sum {} + > ../SHA256SUMS-vscode.txt
          cd ..
          mv artifacts/* .

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            nexus-orchestrator-*.tar.gz
            nexus-orchestrator-*.zip
            nexus-orchestrator*.vsix
            SHA256SUMS.txt
            SHA256SUMS-desktop.txt
            SHA256SUMS-vscode.txt
