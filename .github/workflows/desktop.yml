name: Desktop Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Desktop ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-latest
            platform: darwin/arm64
            archive_ext: tar.gz
            bin_path: build/bin/nexusOrchestrator.app
            archive_name: nexusOrchestrator-darwin-arm64

          - os: darwin
            arch: amd64
            runner: macos-latest
            platform: darwin/amd64
            archive_ext: tar.gz
            bin_path: build/bin/nexusOrchestrator.app
            archive_name: nexusOrchestrator-darwin-amd64

          - os: windows
            arch: amd64
            runner: windows-latest
            platform: windows/amd64
            archive_ext: zip
            bin_path: build/bin/nexusOrchestrator.exe
            archive_name: nexusOrchestrator-windows-amd64

          - os: linux
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            archive_ext: tar.gz
            bin_path: build/bin/nexusOrchestrator
            archive_name: nexusOrchestrator-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev pkg-config

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build desktop app
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          wails build -platform ${{ matrix.platform }} \
            -ldflags "-s -w -X main.version=${VERSION}"

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd build/bin
          tar czf "../../${{ matrix.archive_name }}.tar.gz" *
          cd ../..

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          if (-Not (Test-Path "${{ matrix.bin_path }}")) { Write-Error "Build output not found"; exit 1 }
          Compress-Archive -Path "${{ matrix.bin_path }}" -DestinationPath "${{ matrix.archive_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}.${{ matrix.archive_ext }}
          path: ${{ matrix.archive_name }}.${{ matrix.archive_ext }}

  release:
    name: Attach to Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum nexusOrchestrator-*.* > ../SHA256SUMS-desktop.txt
          cd ..
          mv artifacts/* .

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          files: |
            nexusOrchestrator-*.tar.gz
            nexusOrchestrator-*.zip
            SHA256SUMS-desktop.txt
