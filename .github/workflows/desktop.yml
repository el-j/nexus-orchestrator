name: Desktop Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Desktop ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-latest
            platform: darwin/arm64
            archive_ext: tar.gz
            bin_path: build/bin/NexusAI.app
            archive_name: NexusAI-darwin-arm64

          - os: darwin
            arch: amd64
            runner: macos-latest
            platform: darwin/amd64
            archive_ext: tar.gz
            bin_path: build/bin/NexusAI.app
            archive_name: NexusAI-darwin-amd64

          - os: windows
            arch: amd64
            runner: windows-latest
            platform: windows/amd64
            archive_ext: zip
            bin_path: build/bin/NexusAI.exe
            archive_name: NexusAI-windows-amd64

          - os: linux
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            archive_ext: tar.gz
            bin_path: build/bin/NexusAI
            archive_name: NexusAI-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build desktop app
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          wails build -platform ${{ matrix.platform }} \
            -ldflags "-s -w -X main.version=${VERSION}"

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd build/bin
          tar czf "../../${{ matrix.archive_name }}.tar.gz" *
          cd ../..

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.bin_path }}" -DestinationPath "${{ matrix.archive_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}.${{ matrix.archive_ext }}
          path: ${{ matrix.archive_name }}.${{ matrix.archive_ext }}

  release:
    name: Attach to Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum NexusAI-*.* > ../SHA256SUMS-desktop.txt
          cd ..
          mv artifacts/* .

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            NexusAI-*.tar.gz
            NexusAI-*.zip
            SHA256SUMS-desktop.txt
